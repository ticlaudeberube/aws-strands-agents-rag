
services:
  # etcd - Distributed configuration and metadata storage
  etcd:
    container_name: rag-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    mem_limit: 1g
    memswap_limit: 1g
    cpus: 1.0
    init: true
    networks:
      - rag-network
    restart: unless-stopped

  # MinIO - Object storage for Milvus
  minio:
    container_name: rag-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_OPTS: "--console-address :9001 --certs-dir /etc/ssl/certs"
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - minio-data:/minio_data
    tmpfs:
      - /tmp
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    mem_limit: 2g
    memswap_limit: 2g
    cpus: 2.0
    init: true
    networks:
      - rag-network
    restart: unless-stopped

  # Milvus - Vector database
  milvus:
    container_name: rag-milvus
    image: milvusdb/milvus:v2.6.0
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
      # Performance optimizations
      GOMAXPROCS: "4"
      GOMEMLIMIT: "6GiB"
      # Query performance
      COMMON_QUERYNODE_CACHEBUFFERSIZE: "2147483648"  # 2GB
      QUERYNODE_ENABLEDISK: "true"
      QUERYNODE_DISKCAPACITYLIMIT: "50000000000"  # 50GB
      # Index performance
      INDEXNODE_SCHEDULER_BUILDPARALLEL: "8"
      # Logging
      LOG_LEVEL: "info"
    volumes:
      - milvus-data:/var/lib/milvus
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 120s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    mem_limit: 8g
    memswap_limit: 8g
    cpus: 4.0
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    init: true
    networks:
      - rag-network
    restart: unless-stopped

  # RAG API Server
  rag-api:
    container_name: rag-api
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - OLLAMA_HOST=http://host.docker.internal:11434
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - API_PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - ../src:/app/src
      - ../chatbots:/app/chatbots
      - ../document-loaders:/app/document-loaders
      - rag-cache:/app/.cache
    depends_on:
      milvus:
        condition: service_healthy
    mem_limit: 2g
    memswap_limit: 2g
    cpus: 2.0
    init: true
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # React Chatbot UI (optional - for development/demo)
  react-chatbot:
    container_name: rag-react
    build:
      context: ..
      dockerfile: docker/Dockerfile.react
    environment:
      - REACT_APP_API_PORT=8000
      - REACT_APP_API_HOST=host.docker.internal
    ports:
      - "3000:3000"
    depends_on:
      rag-api:
        condition: service_healthy
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 1.0
    init: true
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  etcd-data:
    driver: local
  minio-data:
    driver: local
  milvus-data:
    driver: local
  rag-cache:
    driver: local

networks:
  rag-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
