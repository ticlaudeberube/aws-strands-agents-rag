# Nginx configuration for React chatbot
# Serves static files and handles API proxying with streaming support

server {
    listen 3000;
    server_name _;

    # App root directory (React build output)
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Gzip compression for faster transfers
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/javascript;
    gzip_min_length 256;
    gzip_vary on;

    # ===== STATIC FILES =====
    # Cache static assets with fingerprinting (*.hash.js, *.hash.css)
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache images and fonts
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ===== API PROXY =====
    # Proxy API requests to backend (with streaming support)
    location /api/ {
        proxy_pass http://host.docker.internal:8000/;

        # Headers for proxying
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming support (Server-Sent Events, chunked responses)
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;

        # Timeouts for long-running requests
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # CORS headers (if backend doesn't provide them)
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        # WebSocket support (future streaming)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ===== REACT ROUTER FALLBACK =====
    # For single-page app: serve index.html for all non-static requests
    location / {
        # Try to serve the exact file/directory first
        try_files $uri $uri/ /index.html;
    }

    # ===== SECURITY =====
    # Deny access to hidden files and directories (.env, .git, etc)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ===== LOGGING =====
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;
}
